# Docker Compose configuration
version: '3'
services:
  app:
    build: .
    ports:
      - '8000:8000'
    volumes:
      - .:/app
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
  db:
    image: mysql:5.7
    environment:
      - MYSQL_DATABASE=example
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
